<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FairwayMate Test</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
<h2>Auth Test</h2>
<input type="email" id="email" placeholder="email" value="test@test.com"><br><br>
<input type="password" id="pass" placeholder="password" value="test123"><br><br>
<button onclick="doTest()">Test Sign In</button>
<div id="result" style="margin-top:20px;color:red"></div>

<script>
const FC = {
  apiKey: "AIzaSyD-H0117WVTSg3jKLH0lGvyQH3PNdIKFEs",
  authDomain: "fairwaymate-625c3.firebaseapp.com",
  projectId: "fairwaymate-625c3",
  storageBucket: "fairwaymate-625c3.firebasestorage.app",
  messagingSenderId: "270289597388",
  appId: "1:270289597388:web:27d76973a400f3a6682369"
};

firebase.initializeApp(FC);

function doTest() {
  const em = document.getElementById('email').value;
  const pw = document.getElementById('pass').value;
  document.getElementById('result').textContent = 'Trying...';
  firebase.auth().signInWithEmailAndPassword(em, pw)
    .then(u => { document.getElementById('result').style.color='green'; document.getElementById('result').textContent = 'SUCCESS: ' + u.user.email; })
    .catch(e => { document.getElementById('result').textContent = 'ERROR: ' + e.message; });
}
</script>
</body>
</html>
